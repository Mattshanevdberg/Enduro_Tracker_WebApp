<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Edit Device</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forms.css') }}" />
  </head>
  <body>
    <main class="page-shell">
      <div class="stack">
        <a class="btn" href="{{ url_for('devices.devices_index') }}">&larr; Back to Devices</a>
      </div>

      <header class="page-header">
        <h1>Edit Device</h1>
        <p>Update tracker notes and RFID EPC details for this registered device.</p>
      </header>

      {% if message is not none %}
        <div class="msg {{ 'ok' if success else 'err' }}">{{ message }}</div>
      {% endif %}

      {% if device %}
        <section class="content-panel">
          <form class="form-grid" method="post" action="{{ url_for('devices.device_edit', device_id=device.id) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <label>Device ID</label>
            <input value="{{ device.id }}" readonly />

            <label for="device_info">Device Info</label>
            <textarea id="device_info" name="device_info" rows="4" placeholder="Optional (e.g., module type, notes)">{{ device.device_info or '' }}</textarea>

            <label for="epc_id">RFID EPC</label>
            <input id="epc_id" name="epc_id" maxlength="128" value="{{ device.epc_id or '' }}" placeholder="Optional RFID tag EPC"/>

            <label><input type="checkbox" name="returned" {{ 'checked' if device.returned else '' }}/> Returned</label>
            <label><input type="checkbox" name="active" {{ 'checked' if device.active else '' }}/> Active</label>

            <div class="actions">
              <button class="btn" type="submit">Save</button>
              <a class="btn" href="{{ url_for('home.dashboard_admin') }}">Admin Dashboard</a>
            </div>
          </form>
        </section>
      {% endif %}
    </main>
  </body>
</html>
