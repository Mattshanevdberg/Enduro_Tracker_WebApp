<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Kooksnylive — Sign Up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base_new.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forms_new.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
  </head>
  <body class="auth-page">
    <header class="auth-topbar">
      <a class="auth-brand" href="{{ url_for('home.home_page') }}" aria-label="Kooksnylive home">
        <img src="{{ url_for('static', filename='images/brand/logo.svg') }}" alt="" />
        <span>Kooksnylive</span>
      </a>
    </header>

    <main class="auth-shell">
      <section class="content-panel auth-card" aria-labelledby="signup-title">
        <header class="auth-card-header">
          <h1 id="signup-title">Create Rider Account</h1>
          <p>Sign up as a rider, then complete your linked rider profile.</p>
        </header>

        {% if message %}
          <div class="msg {{ 'ok' if success else 'err' }}">{{ message }}</div>
        {% endif %}

        <form class="form-grid" method="post" action="{{ url_for('auth.signup') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

          <label for="first_name">Name *</label>
          <input
            id="first_name"
            name="first_name"
            autocomplete="given-name"
            required
            value="{{ form.first_name or '' }}"
          />

          <label for="last_name">Surname *</label>
          <input
            id="last_name"
            name="last_name"
            autocomplete="family-name"
            required
            value="{{ form.last_name or '' }}"
          />

          <label for="username">Username *</label>
          <input
            id="username"
            name="username"
            autocomplete="username"
            required
            value="{{ form.username or '' }}"
          />

          <label for="email">Email address *</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            required
            value="{{ form.email or '' }}"
          />

          <label for="password">Password *</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            minlength="6"
            required
          />

          <label for="password_confirm">Re-enter password *</label>
          <input
            id="password_confirm"
            name="password_confirm"
            type="password"
            autocomplete="new-password"
            minlength="6"
            required
          />

          <p class="muted auth-form-help">
            Passwords must be at least 6 characters and contain a number or special character.
          </p>

          <div class="actions auth-actions auth-actions-two">
            <a class="auth-action" href="{{ url_for('home.dashboard') }}">
              <img
                class="auth-action-image"
                src="{{ url_for('static', filename='images/icons/view_races.svg') }}"
                alt=""
              />
              <span class="auth-action-label">View Races</span>
            </a>
            <button class="auth-action" type="submit">
              <img
                class="auth-action-image auth-action-image-dark"
                src="{{ url_for('static', filename='images/icons/signup-rider.svg') }}"
                alt=""
              />
              <span class="auth-action-label">Sign Up</span>
            </button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
