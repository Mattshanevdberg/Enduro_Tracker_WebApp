<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Kooksnylive — Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base_new.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forms_new.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}" />
  </head>
  <body class="login-page">
    <header class="login-topbar">
      <a class="login-brand" href="{{ url_for('home.home_page') }}" aria-label="Kooksnylive home">
        <img src="{{ url_for('static', filename='images/brand/logo.svg') }}" alt="" />
        <span>Kooksnylive</span>
      </a>
    </header>

    <main class="login-shell">
      <section class="content-panel login-card" aria-labelledby="login-title">
        <header class="login-card-header">
          <h1 id="login-title">Login</h1>
          <p>Log in with your username or email address.</p>
        </header>

        {% if message %}
          <div class="msg {{ 'ok' if success else 'err' }}">{{ message }}</div>
        {% endif %}

        <form class="form-grid login-form" method="post" action="{{ url_for('auth.login') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

          <label for="identifier">Username or email *</label>
          <input
            id="identifier"
            name="identifier"
            autocomplete="username"
            required
            value="{{ form.identifier or '' }}"
          />

          <label for="password">Password *</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />

          <!-- The submit remains a real button; companion actions remain real links. -->
          <div class="actions login-actions">
            <button class="login-action" type="submit">
              <img
                class="login-action-image login-action-image-dark"
                src="{{ url_for('static', filename='images/icons/login-rider.svg') }}"
                alt=""
              />
              <span class="login-action-label">Login</span>
            </button>
            <a class="login-action" href="{{ url_for('auth.forgot_password') }}">
              <img
                class="login-action-image"
                src="{{ url_for('static', filename='images/icons/forgot_password.svg') }}"
                alt=""
              />
              <span class="login-action-label">Forgot Password</span>
            </a>
            <a class="login-action" href="{{ url_for('auth.signup') }}">
              <img
                class="login-action-image login-action-image-dark"
                src="{{ url_for('static', filename='images/icons/signup-rider.svg') }}"
                alt=""
              />
              <span class="login-action-label">Sign Up</span>
            </a>
            <a class="login-action" href="{{ url_for('home.dashboard') }}">
              <img
                class="login-action-image login-action-image-dark"
                src="{{ url_for('static', filename='images/icons/view_races.svg') }}"
                alt=""
              />
              <span class="login-action-label">View Races</span>
            </a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
