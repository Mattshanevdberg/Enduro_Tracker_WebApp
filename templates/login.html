<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Kooksnylive — Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forms.css') }}" />
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <h1>Login</h1>
        <p>Log in with your username or email address.</p>
      </header>

      {% if message %}
        <div class="msg {{ 'ok' if success else 'err' }}">{{ message }}</div>
      {% endif %}

      <section class="content-panel">
        <form class="form-grid" method="post" action="{{ url_for('auth.login') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

          <label for="identifier">Username or email *</label>
          <input
            id="identifier"
            name="identifier"
            autocomplete="username"
            required
            value="{{ form.identifier or '' }}"
          />

          <label for="password">Password *</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />

          <div class="actions">
            <button class="btn" type="submit">Login</button>
            <a class="btn" href="{{ url_for('auth.forgot_password') }}">Forgot Password</a>
            <a class="btn" href="{{ url_for('auth.signup') }}">Sign Up</a>
            <a class="btn" href="{{ url_for('home.home_page') }}">Back to Home</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
