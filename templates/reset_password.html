<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Kooksnylive — Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base_new.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forms_new.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
  </head>
  <body class="auth-page">
    <header class="auth-topbar">
      <a class="auth-brand" href="{{ url_for('home.home_page') }}" aria-label="Kooksnylive home">
        <img src="{{ url_for('static', filename='images/brand/logo.svg') }}" alt="" />
        <span>Kooksnylive</span>
      </a>
    </header>

    <main class="auth-shell">
      <section class="content-panel auth-card" aria-labelledby="reset-password-title">
        <header class="auth-card-header">
          <h1 id="reset-password-title">Reset Password</h1>
          <p>Choose a new password for your account.</p>
        </header>

        {% if message %}
          <div class="msg {{ 'ok' if success else 'err' }}">{{ message }}</div>
        {% endif %}

        <form class="form-grid" method="post" action="{{ url_for('auth.reset_password', token=token) }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

          <label for="password">New password *</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            minlength="6"
            required
          />

          <label for="password_confirm">Re-enter new password *</label>
          <input
            id="password_confirm"
            name="password_confirm"
            type="password"
            autocomplete="new-password"
            minlength="6"
            required
          />

          <p class="muted auth-form-help">
            Passwords must be at least 6 characters and contain a number or special character.
          </p>

          <div class="actions auth-actions auth-actions-two">
            <a class="auth-action" href="{{ url_for('auth.login') }}">
              <img
                class="auth-action-image auth-action-image-dark"
                src="{{ url_for('static', filename='images/icons/login-rider.svg') }}"
                alt=""
              />
              <span class="auth-action-label">Back to Login</span>
            </a>
            <button class="auth-action" type="submit">
              <img
                class="auth-action-image"
                src="{{ url_for('static', filename='images/icons/reset_password.svg') }}"
                alt=""
              />
              <span class="auth-action-label">Reset Password</span>
            </button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
