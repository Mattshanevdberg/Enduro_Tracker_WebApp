<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Kooksnylive — Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forms.css') }}" />
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <h1>Reset Password</h1>
        <p>Choose a new password for your account.</p>
      </header>

      {% if message %}
        <div class="msg {{ 'ok' if success else 'err' }}">{{ message }}</div>
      {% endif %}

      <section class="content-panel">
        <form class="form-grid" method="post" action="{{ url_for('auth.reset_password', token=token) }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

          <label for="password">New password *</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            minlength="6"
            required
          />

          <label for="password_confirm">Re-enter new password *</label>
          <input
            id="password_confirm"
            name="password_confirm"
            type="password"
            autocomplete="new-password"
            minlength="6"
            required
          />

          <p class="muted">
            Passwords must be at least 6 characters and contain a number or special character.
          </p>

          <div class="actions">
            <button class="btn" type="submit">Reset Password</button>
            <a class="btn" href="{{ url_for('auth.login') }}">Back to Login</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
