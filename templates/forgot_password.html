<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Kooksnylive — Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forms.css') }}" />
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <h1>Forgot Password</h1>
        <p>Enter your account email address and we will send a reset link if the account exists.</p>
      </header>

      {% if message %}
        <div class="msg {{ 'ok' if success else 'err' }}">{{ message }}</div>
      {% endif %}

      <section class="content-panel">
        <form class="form-grid" method="post" action="{{ url_for('auth.forgot_password') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

          <label for="email">Email address *</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            required
            value="{{ form.email or '' }}"
          />

          <div class="actions">
            <button class="btn" type="submit">Send Reset Link</button>
            <a class="btn" href="{{ url_for('auth.login') }}">Back to Login</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
